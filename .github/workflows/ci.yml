name: reproducibility

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev,plot,symbolic,report]"
      - run: python -m compileall -q src scripts tests
      - run: python -m pytest -q
      - run: python scripts/verify_interval_certificate.py
      - run: python scripts/verify_route2_algebra.py
      - run: python scripts/verify_exact_certificates.py
